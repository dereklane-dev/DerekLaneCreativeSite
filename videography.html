<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videography | Derek Lane Creative Portfolio</title>
    <meta name="description" content="Watch Derek Lane's videography projects, including music videos, live concert videos, product videography, and other creative video content.">
    <meta name="keywords" content="Derek Lane, videography, video projects, films, creative portfolio">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main>

        <section>

            </div>

                    <button data-filter="360-camera">360 Camera</button>

            <div id="projects" data-base-category="videography" class="projects-grid"></div>

        </section>

        <div>

            <a href="/all-projects.html" class="button">All Projects</a>

        </div>

    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
