<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Derek Lane | Creative Portfolio</title>
    <meta name="description" content="Get in touch with Derek Lane for web design, UX, graphic design, videography, photography, and music projects.">
    <meta name="keywords" content="Derek Lane, contact, creative services, web design, UX, graphic design, videography, photography, music">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main>

        <section class="centered-text">

            <h1>Contact Me</h1>

            <p>Have a job oppurtunity or just want to say hi?</p>
            
            <p>Fill out the form below.</p>

        </section>

        <div id="contact" class="card">

                <form id="contactForm" action="/php/sendmail.php" method="POST">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Your Name" required>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required>

                <label for="subject">Subject</label>
                <input type="text" name="subject" id="subject" placeholder="Subject" required>

                <label for="message">Message</label>
                <textarea name="message" id="message" rows="5" placeholder="Your message here..." required></textarea>

                <button type="submit">Send Message</button>
                </form>

                <div id="formFeedback"></div>

        </div>

        <section>

                <h2>Or Reach Out Here</h2>

            <div class="contact-info centered-text">

                <p>Email: <a href="mailto:contact@dereklanecreative.com">contact@dereklanecreative.com</a></p>

            </div>

            <div class="social-links">

                <a href="https://www.facebook.com/dereklanecreative" target="_blank">
                <img class="social-image" src="/images/facebook-icon.png" alt="Link to Derek Lane Creative Facebook page">
                </a>
                <a href="https://www.youtube.com/@DerekLaneCreative" target="_blank">
                <img class="social-image" src="/images/youtube-icon.png" alt="Link to Derek Lane Creative Youtube page">
                </a>
                <a href="https://www.instagram.com/dereklanecreative/" target="_blank">
                <img class="social-image" src="/images/instagram-icon.png" alt="Link to Derek Lane Creative Instagram page">
                </a>

            </div>

        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
    <script src="/js/contact.js"></script>

</body>

</html>
